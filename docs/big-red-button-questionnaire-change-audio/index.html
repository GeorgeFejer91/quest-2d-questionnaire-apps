<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Big Red Button Questionnaire Change Audio</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172026;
      --muted: #5c6b73;
      --line: #d5dde2;
      --surface: #f7f9fa;
      --accent: #b42318;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #ffffff;
      line-height: 1.5;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
    }

    .note {
      border: 1px solid var(--line);
      border-left: 5px solid var(--accent);
      padding: 18px;
      margin: 18px 0;
      background: var(--surface);
    }

    .note h2 {
      margin: 0 0 12px;
      font-size: 1.15rem;
    }

    audio {
      display: block;
      width: 100%;
      margin: 0 0 10px;
    }

    a {
      color: var(--accent);
      font-weight: 650;
    }
  </style>
</head>
<body>
  <main>
    <h1>Big Red Button Questionnaire Change Audio</h1>
    <p>Two MP3 notes for the questionnaire change request, published from the Quest 2D Questionnaire Apps repository.</p>

    <section class="note">
      <h2>1. First questionnaire change</h2>
      <audio controls preload="metadata" src="questionnaire-change-1-first-questionnaire-change.mp3"></audio>
      <a href="questionnaire-change-1-first-questionnaire-change.mp3">Open MP3 file</a>
    </section>

    <section class="note">
      <h2>2. Second questionnaire change excuse</h2>
      <audio controls preload="metadata" src="questionnaire-change-2-second-questionnaire-change-excuse.mp3"></audio>
      <a href="questionnaire-change-2-second-questionnaire-change-excuse.mp3">Open MP3 file</a>
    </section>

    <p><a href="../../">Back to Quest 2D Questionnaire Apps docs</a></p>
  </main>
</body>
</html>
